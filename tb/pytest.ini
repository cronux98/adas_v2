[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --timeout=600
timeout = 600
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    ai_accel: AI accelerator tests
    peripheral: peripheral tests
    safety: safety subsystem tests
    axi: AXI protocol compliance tests
    regression: full regression suite tests
    unit: unit tests
